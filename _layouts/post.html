---
layout: default
---

<article class="post-shell">
  <header class="post-header">
    <p class="section-kicker">Blog</p>
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>
  <section class="markdown-body">
    {{ content }}
  </section>
</article>
